<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>Evomentor — 个人学习助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/xml.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <button id="toggle-sidebar" title="展开/收起菜单">&#9776;</button>
        <h1>Evomentor <span class="current-tab" id="current-tab-label"></span></h1>
    </header>

    <div id="main-wrap">
        <nav id="sidebar">
            <button class="tab-btn active" data-tab="chat"><span class="icon">&#128172;</span>聊天</button>
            <button class="tab-btn" data-tab="reports"><span class="icon">&#128196;</span>报告</button>
            <button class="tab-btn" data-tab="emails"><span class="icon">&#9993;</span>邮件</button>
            <button class="tab-btn" data-tab="memories"><span class="icon">&#129504;</span>记忆</button>
            <button class="tab-btn" data-tab="graph"><span class="icon">&#128279;</span>图谱</button>
            <button class="tab-btn" data-tab="skills"><span class="icon">&#128736;</span>Skills</button>
            <button class="tab-btn" data-tab="actions"><span class="icon">&#9889;</span>操作</button>
        </nav>

        <main id="content">
            <!-- 聊天 Tab -->
            <div class="tab-panel active" id="panel-chat">
                <div id="chat-messages"></div>
                <div id="input-area">
                    <div id="model-selector" class="model-capsule" onclick="toggleModelMenu()">
                        <span id="current-model-icon">⚡</span>
                        <span id="current-model-name">加载中...</span>
                        <span class="model-arrow">▾</span>
                    </div>
                    <div id="model-menu" class="model-menu" style="display:none;"></div>
                    <textarea id="message" rows="2" placeholder="输入你的问题... (Enter 发送, Shift+Enter 换行)"></textarea>
                    <button id="send" onclick="sendMessage()">发送</button>
                </div>
            </div>

            <!-- 报告 Tab -->
            <div class="tab-panel" id="panel-reports">
                <div class="toolbar">
                    <input type="text" id="report-search" placeholder="搜索报告...">
                    <select id="report-type-filter">
                        <option value="">全部类型</option>
                        <option value="github">GitHub 分析</option>
                        <option value="research">研究搜索</option>
                        <option value="agent_report">学习周报</option>
                    </select>
                    <button id="trigger-reflect-btn" style="margin-left:auto;">手动反思</button>
                </div>
                <div id="report-list"></div>
                <button class="secondary" id="report-load-more" style="display:none">加载更多</button>
            </div>

            <!-- 邮件 Tab -->
            <div class="tab-panel" id="panel-emails">
                <div class="toolbar">
                    <span style="font-size:13px;color:#888;">状态：</span>
                    <button class="secondary status-filter active" data-status="">全部</button>
                    <button class="secondary status-filter" data-status="sent">已发送</button>
                    <button class="secondary status-filter" data-status="pending">待发</button>
                    <button class="secondary status-filter" data-status="failed">失败</button>
                    <button id="send-all-btn" style="margin-left:auto;">立即发送全部</button>
                </div>
                <div id="email-list"></div>
                <button class="secondary" id="email-load-more" style="display:none">加载更多</button>
            </div>

            <!-- 记忆 Tab -->
            <div class="tab-panel" id="panel-memories">
                <div class="toolbar">
                    <input type="text" id="memory-search" placeholder="搜索记忆...">
                    <select id="memory-type-filter">
                        <option value="">全部类型</option>
                        <option value="conversation">对话</option>
                        <option value="experience">经验</option>
                        <option value="decision">决策</option>
                    </select>
                </div>
                <div id="memory-list"></div>
                <button class="secondary" id="memory-load-more" style="display:none">加载更多</button>
            </div>

            <!-- 知识图谱 Tab -->
            <div class="tab-panel" id="panel-graph">
                <div class="graph-toolbar">
                    <input type="text" id="graph-search" placeholder="搜索知识点...">
                    <select id="graph-category">
                        <option value="">全部分类</option>
                    </select>
                    <label class="slider-label">
                        熟练度 ≥ <span id="level-val">0</span>
                        <input type="range" id="graph-level" min="0" max="5" value="0">
                    </label>
                    <button class="secondary" id="graph-reset">重置</button>
                </div>
                <div id="graph-svg-container"></div>
                <div id="graph-legend"></div>
                <div id="graph-tooltip" style="display:none;"></div>
                <div id="graph-list"></div>
            </div>

            <!-- Skills Tab -->
            <div class="tab-panel" id="panel-skills">
                <div class="toolbar">
                    <input type="text" id="skill-search" placeholder="搜索 Skill...">
                </div>
                <div id="skill-list"></div>
                <button class="secondary" id="skill-load-more" style="display:none">加载更多</button>
            </div>

            <!-- 操作 Tab -->
            <div class="tab-panel" id="panel-actions">
                <div id="action-cards" class="action-cards">
                    <!-- 动态从 /api/actions 加载 -->
                </div>
                <div id="action-stream" class="action-stream" style="display:none;">
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modal" style="display:none;">
        <div class="modal-box">
            <h3>确认删除</h3>
            <p id="modal-msg">确定要删除这条记录吗？此操作不可撤销。</p>
            <div class="modal-actions">
                <button class="secondary" id="modal-cancel">取消</button>
                <button id="modal-confirm">确认删除</button>
            </div>
        </div>
    </div>

<script>
// 配置 marked + highlight.js（CDN 不可用时自动降级）
let markdownAvailable = false;
if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
    if (typeof hljs !== 'undefined') {
        hljs.configure({ languages: [] });
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
                }
                try { return hljs.highlightAuto(code).value; } catch (e) { return code; }
            },
        });
    }
    markdownAvailable = true;
}

// 安全的 markdown 渲染函数
function renderMarkdown(text) {
    if (markdownAvailable) return marked.parse(text);
    return simpleMd(text);  // 降级到内置简单渲染
}

// ═══ 全局状态 ═══
const STATE = {
    sidebarOpen: false,
    currentTab: 'chat',
    reports: { offset: 0, items: [], hasMore: true },
    emails: { offset: 0, items: [], hasMore: true, status: '' },
    memories: { offset: 0, items: [], hasMore: true, type: '', search: '' },
    skills: { offset: 0, items: [], hasMore: true },
    actionsLoaded: false,
};

// ═══ 工具函数 ═══
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function showToast(msg, ok = false) {
    const t = $('#toast');
    t.textContent = msg; t.className = 'toast ' + (ok ? 'success' : '') + ' show';
    setTimeout(() => { t.classList.remove('show'); }, 2500);
}

function showModal(msg) {
    return new Promise(resolve => {
        $('#modal-msg').textContent = msg;
        $('#modal').style.display = 'flex';
        $('#modal-cancel').onclick = () => { $('#modal').style.display = 'none'; resolve(false); };
        $('#modal-confirm').onclick = () => { $('#modal').style.display = 'none'; resolve(true); };
    });
}

async function api(url, opts = {}) {
    try {
        const resp = await fetch(url, opts);
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${resp.status}`);
        }
        return await resp.json();
    } catch (e) {
        showToast('请求失败: ' + e.message);
        throw e;
    }
}

function simpleMd(text) {
    if (!text) return '';
    let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/(?<!!)\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" style="color:#58a6ff;">$1</a>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n/g, '<br>');
    html = html.replace(/(<br>\s*)+/g, '<br>');
    return html;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + (dateStr.endsWith('Z') ? '' : 'Z'));
    if (isNaN(d.getTime())) return dateStr;
    const now = new Date();
    const mins = Math.floor((now - d) / 60000);
    if (mins < 1) return '刚刚';
    if (mins < 60) return mins + '分钟前';
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + '小时前';
    const days = Math.floor(hours / 24);
    if (days < 30) return days + '天前';
    return d.toLocaleDateString('zh-CN');
}

function debounce(fn, ms) {
    let timer;
    return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), ms);
    };
}

// ═══ 侧边栏 ═══
function toggleSidebar() {
    STATE.sidebarOpen = !STATE.sidebarOpen;
    $('#sidebar').classList.toggle('open', STATE.sidebarOpen);
}
$('#toggle-sidebar').addEventListener('click', toggleSidebar);

function switchTab(name) {
    STATE.currentTab = name;
    $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    $$('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
    $('#current-tab-label').textContent = '— ' + ({
        chat:'聊天', reports:'报告', emails:'邮件', memories:'记忆', graph:'图谱', skills:'Skills', actions:'操作'
    })[name] || '';
    // 懒加载各 Tab 数据
    if (name === 'reports' && STATE.reports.items.length === 0) loadReports();
    if (name === 'emails' && STATE.emails.items.length === 0) loadEmails();
    if (name === 'memories' && STATE.memories.items.length === 0) loadMemories();
    if (name === 'graph') loadGraph();
    if (name === 'skills' && STATE.skills.items.length === 0) loadSkills();
    if (name === 'actions' && !STATE.actionsLoaded) loadActions();
}

$$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ═══ 模型选择器 ═══
let availableModels = [];
let currentModel = '';

async function initModelSelector() {
    try {
        const data = await api('/api/models');
        if (!data || !data.models || !data.models.length) return;
        availableModels = data.models;
        currentModel = localStorage.getItem('evomentor-model') || data.default;
        if (!availableModels.find(m => m.id === currentModel)) {
            currentModel = data.default;
        }
        renderModelSelector();
    } catch (e) {
        document.getElementById('model-selector').style.display = 'none';
    }
}

function renderModelSelector() {
    const model = availableModels.find(m => m.id === currentModel);
    if (!model) return;
    document.getElementById('current-model-icon').textContent = model.icon;
    document.getElementById('current-model-name').textContent = model.name;
}

function toggleModelMenu() {
    const menu = document.getElementById('model-menu');
    const capsule = document.getElementById('model-selector');
    if (!menu || !capsule || availableModels.length === 0) return;
    if (menu.style.display === 'none' || !menu.style.display) {
        renderModelMenu();
        menu.style.display = 'block';
        capsule.classList.add('open');
    } else {
        menu.style.display = 'none';
        capsule.classList.remove('open');
    }
}

function selectModel(modelId) {
    currentModel = modelId;
    localStorage.setItem('evomentor-model', modelId);
    renderModelSelector();
    document.getElementById('model-menu').style.display = 'none';
    document.getElementById('model-selector').classList.remove('open');
}

function renderModelMenu() {
    const menu = document.getElementById('model-menu');
    const providers = [...new Set(availableModels.map(m => m.provider))];
    menu.innerHTML = '';
    providers.forEach((provider) => {
        availableModels.filter(m => m.provider === provider).forEach(model => {
            const selected = model.id === currentModel;
            const div = document.createElement('div');
            div.className = 'model-option' + (selected ? ' selected' : '');
            div.innerHTML = `
                <span class="model-icon">${model.icon}</span>
                <div class="model-info">
                    <div class="model-name">${model.name}</div>
                    <div class="model-desc">${model.description}</div>
                </div>
                ${selected ? '<span class="model-check">✓</span>' : ''}
            `;
            div.addEventListener('click', (e) => { e.stopPropagation(); selectModel(model.id); });
            menu.appendChild(div);
        });
    });
    const model = availableModels.find(m => m.id === currentModel);
    if (model) {
        const footer = document.createElement('div');
        footer.className = 'model-provider';
        footer.textContent = model.provider + ' 提供';
        menu.appendChild(footer);
    }
}

// 页面初始化时加载模型列表
initModelSelector();

// 全局点击：点击模型菜单外部关闭
document.addEventListener('click', (e) => {
    const menu = document.getElementById('model-menu');
    const capsule = document.getElementById('model-selector');
    if (menu && capsule && menu.style.display === 'block') {
        if (!capsule.contains(e.target) && !menu.contains(e.target)) {
            menu.style.display = 'none';
            capsule.classList.remove('open');
        }
    }
});

// ═══ 聊天 Tab ═══
const chatMessages = document.getElementById('chat-messages');
const msgInput = document.getElementById('message');
const sendBtn = document.getElementById('send');

msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    addChatMsg('user', text);
    msgInput.value = '';
    sendBtn.disabled = true;

    const streamCtrl = createStreamingMsg();

    try {
        const resp = await fetch('/api/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, model: currentModel }),
        });

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${resp.status}`);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const event = JSON.parse(line.slice(6));
                        handleSSEEvent(event, streamCtrl);
                    } catch (e) {
                        // 忽略 JSON 解析错误
                    }
                }
            }
        }
    } catch (e) {
        streamCtrl.finalize('请求失败: ' + escapeHtml(e.message));
    }
    sendBtn.disabled = false;
}

function addChatMsg(role, content, isLoading = false) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (isLoading) {
        div.classList.add('loading');
        div.textContent = content;
    } else if (role === 'assistant') {
        div.innerHTML = renderMarkdown(content);
    } else if (role === 'user') {
        div.innerHTML = simpleMd(content);
    }
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
}

// ═══ 共享流式渲染（聊天 Tab 和操作 Tab 共用） ═══
function createStreamingPanel(container) {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';
    container.appendChild(wrapper);

    let fullText = '';
    let toolDetails = null;
    let toolList = null;

    function scrollToBottom() {
        container.scrollTop = container.scrollHeight;
    }

    function appendText(chunk) {
        fullText += chunk;
        const html = renderMarkdown(fullText);
        wrapper.innerHTML = html;
        if (toolDetails) {
            wrapper.appendChild(toolDetails);
        }
        scrollToBottom();
    }

    function showToolStart(toolNames) {
        if (!toolDetails) {
            toolDetails = document.createElement('details');
            toolDetails.className = 'tool-steps';
            toolDetails.open = true;
            toolDetails.innerHTML = '<summary>正在调用工具...</summary>';
            toolList = document.createElement('div');
            toolList.className = 'tool-list';
            toolDetails.appendChild(toolList);
        }
        if (!toolDetails.parentNode) {
            wrapper.appendChild(toolDetails);
        }
    }

    function showToolStep(name, status) {
        if (!toolDetails) return;
        const icon = status === 'running' ? '⏳' :
                     status === 'done' ? '✅' : '❌';
        const existing = toolList.querySelector('.tool-step[data-tool="' + name + '"]');
        if (existing) {
            existing.className = 'tool-step ' + status;
            existing.textContent = icon + ' ' + name;
        } else {
            const step = document.createElement('div');
            step.className = 'tool-step ' + status;
            step.textContent = icon + ' ' + name;
            step.setAttribute('data-tool', name);
            toolList.appendChild(step);
        }
        if (status === 'done' || status === 'error') {
            const doneCount = toolList.querySelectorAll('.tool-step.done, .tool-step.error').length;
            const total = toolList.children.length;
            toolDetails.querySelector('summary').textContent =
                '⚙ 工具调用 (' + doneCount + '/' + total + ')';
        }
        scrollToBottom();
    }

    function hideTools() {
        if (toolDetails) {
            toolDetails.open = false;
        }
    }

    function finalize(errorText) {
        if (errorText) {
            wrapper.innerHTML = renderMarkdown(errorText);
        } else if (fullText) {
            wrapper.innerHTML = renderMarkdown(fullText);
            if (toolDetails) {
                wrapper.appendChild(toolDetails);
                toolDetails.open = false;
            }
        } else if (!toolDetails) {
            wrapper.innerHTML = '<span style="color:#888;">(空回复)</span>';
        }
        scrollToBottom();
    }

    return { appendText, showToolStart, showToolStep, hideTools, finalize };
}

function handleSSEEvent(event, streamCtrl) {
    switch (event.type) {
        case 'text':
            streamCtrl.appendText(event.content);
            break;
        case 'tool_start':
            streamCtrl.showToolStart(
                (event.tools || []).map(t => t.name)
            );
            break;
        case 'tool_step':
            streamCtrl.showToolStep(event.name, event.status);
            break;
        case 'tool_end':
            streamCtrl.hideTools();
            break;
        case 'done':
            streamCtrl.finalize(null);
            break;
        case 'error':
            streamCtrl.finalize(event.message || '未知错误');
            break;
    }
}

// ═══ 聊天 Tab 流式 ═══
function createStreamingMsg() {
    return createStreamingPanel(chatMessages);
}

// ═══ 报告 Tab ═══
async function loadReports(reset = true) {
    if (reset) { STATE.reports.offset = 0; STATE.reports.items = []; STATE.reports.hasMore = true; $('#report-list').innerHTML = ''; }
    if (!STATE.reports.hasMore) return;
    const type = $('#report-type-filter').value;
    const params = new URLSearchParams({ limit: '20', offset: String(STATE.reports.offset) });
    if (type) params.set('type', type);
    const data = await api('/api/reports?' + params);
    STATE.reports.items = STATE.reports.items.concat(data.items);
    STATE.reports.offset += data.items.length;
    STATE.reports.hasMore = data.items.length === 20;
    renderReportList();
    $('#report-load-more').style.display = STATE.reports.hasMore ? 'block' : 'none';
}

function renderReportList() {
    const container = $('#report-list');
    const search = ($('#report-search').value || '').toLowerCase();
    container.innerHTML = '';
    STATE.reports.items.forEach(item => {
        if (search && !item.title.toLowerCase().includes(search) && !item.preview.toLowerCase().includes(search)) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <div>
                    <span class="badge ${item.type}">${item.type === 'github' ? 'GitHub' : item.type === 'research' ? '研究' : '周报'}</span>
                    <span class="card-title">${escapeHtml(item.title)}</span>
                    <div class="card-meta">${timeAgo(item.created_at)}</div>
                </div>
                <button class="delete-btn" data-action="delete-report" data-id="${item.id}">&times;</button>
            </div>
            <div class="card-preview">${escapeHtml(item.preview)}</div>
            <div class="card-detail"></div>
        `;
        card.addEventListener('click', async (e) => {
            if (e.target.closest('[data-action]')) return;
            const detail = card.querySelector('.card-detail');
            if (card.classList.contains('expanded')) {
                card.classList.remove('expanded');
                return;
            }
            if (!detail.innerHTML) {
                detail.innerHTML = '<span style="color:#888;">加载中...</span>';
                try {
                    const full = await api('/api/reports/' + item.id);
                    detail.innerHTML = simpleMd(full.content || full.suggestions || '');
                } catch (e) {
                    detail.innerHTML = '<span style="color:#e94560;">加载失败</span>';
                }
            }
            card.classList.add('expanded');
        });
        container.appendChild(card);
    });
}

$('#report-search').addEventListener('input', () => renderReportList());
$('#report-type-filter').addEventListener('change', () => loadReports(true));
$('#report-load-more').addEventListener('click', () => loadReports(false));

// ═══ 邮件 Tab ═══
async function loadEmails(reset = true) {
    if (reset) { STATE.emails.offset = 0; STATE.emails.items = []; STATE.emails.hasMore = true; $('#email-list').innerHTML = ''; }
    if (!STATE.emails.hasMore) return;
    const params = new URLSearchParams({ limit: '20', offset: String(STATE.emails.offset) });
    if (STATE.emails.status) params.set('status', STATE.emails.status);
    const data = await api('/api/emails?' + params);
    STATE.emails.items = STATE.emails.items.concat(data.items);
    STATE.emails.offset += data.items.length;
    STATE.emails.hasMore = data.items.length === 20;
    renderEmailList();
    $('#email-load-more').style.display = STATE.emails.hasMore ? 'block' : 'none';
}

function renderEmailList() {
    const container = $('#email-list');
    container.innerHTML = '';
    STATE.emails.items.forEach(item => {
        const statusText = { sent: '已发送', pending: '待发', failed: '失败' }[item.status] || item.status;
        const statusIcon = { sent: '&#9989;', pending: '&#9203;', failed: '&#10060;' }[item.status] || '';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <div>
                    <span class="status-dot ${item.status}"></span>
                    <span style="font-size:12px;color:#888;">${statusIcon} ${statusText}</span>
                    <span class="card-title">${escapeHtml(item.subject || '(无主题)')}</span>
                    <div class="card-meta">${timeAgo(item.sent_at || item.scheduled_at)}</div>
                </div>
                <button class="delete-btn" data-action="delete-email" data-id="${item.id}">&times;</button>
            </div>
            <div class="card-preview">${escapeHtml(item.preview)}</div>
            <div class="card-detail"></div>
        `;
        card.addEventListener('click', async (e) => {
            if (e.target.closest('[data-action]')) return;
            const detail = card.querySelector('.card-detail');
            if (card.classList.contains('expanded')) { card.classList.remove('expanded'); return; }
            if (!detail.innerHTML) {
                detail.innerHTML = '<span style="color:#888;">加载中...</span>';
                try {
                    const full = await api('/api/emails/' + item.id);
                    detail.innerHTML = `<iframe class="email-frame" srcdoc="${full.body.replace(/"/g, '&quot;')}" sandbox="allow-same-origin"></iframe>`;
                } catch (e) {
                    detail.innerHTML = '<span style="color:#e94560;">加载失败</span>';
                }
            }
            card.classList.add('expanded');
        });
        container.appendChild(card);
    });
}

// ═══ 知识图谱 Tab ═══
let graphData = { nodes: [], edges: [], groups: [] };
let graphSimulation = null;
let graphColor = null;

async function loadGraph() {
    const search = $('#graph-search').value || '';
    const parent = $('#graph-category').value || '';
    const minLevel = parseInt($('#graph-level').value) || 0;
    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (parent) params.set('parent', parent);
    if (minLevel > 0) params.set('min_level', minLevel);

    const url = '/api/graph' + (params.toString() ? '?' + params.toString() : '');
    const data = await api(url);
    graphData = data;
    updateCategorySelect(data.groups);
    drawGraph(data);
    renderLegend(data.groups);
    renderGraphList(data.nodes);
}

function updateCategorySelect(groups) {
    const sel = $('#graph-category');
    const current = sel.value;
    sel.innerHTML = '<option value="">全部分类</option>';
    groups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        sel.appendChild(opt);
    });
    sel.value = current;
}

function drawGraph(data) {
    const container = $('#graph-svg-container');
    container.innerHTML = '';

    if (data.nodes.length === 0) {
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;">暂无匹配的知识图谱数据</div>';
        return;
    }

    const rect = container.getBoundingClientRect();
    const w = rect.width;
    const h = 500;

    const svg = d3.select('#graph-svg-container')
        .append('svg')
        .attr('width', w)
        .attr('height', h);

    const g = svg.append('g');

    // 缩放平移
    const zoom = d3.zoom()
        .scaleExtent([0.15, 5])
        .on('zoom', (event) => {
            g.attr('transform', event.transform);
        });
    svg.call(zoom);

    // 颜色映射
    graphColor = d3.scaleOrdinal(d3.schemeCategory10).domain(data.groups);

    // 力模拟
    const simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(data.edges).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-350))
        .force('center', d3.forceCenter(w / 2, h / 2))
        .force('collide', d3.forceCollide().radius(d => (d.proficiency || 0) * 5 + 18));

    graphSimulation = simulation;

    // 绘制边
    const link = g.append('g')
        .attr('stroke', '#444')
        .attr('stroke-opacity', 0.5)
        .attr('stroke-width', 1.2)
        .selectAll('line')
        .data(data.edges)
        .join('line');

    // 绘制节点
    const node = g.append('g')
        .selectAll('circle')
        .data(data.nodes)
        .join('circle')
        .attr('r', d => d.is_category ? 6 : 8 + (d.proficiency || 0) * 5)
        .attr('fill', d => d.is_category ? '#555' : graphColor(d.group))
        .attr('stroke', d => d.is_category ? '#666' : '#fff')
        .attr('stroke-width', d => d.is_category ? 1 : 1.5)
        .attr('stroke-dasharray', d => d.is_category ? '4 2' : 'none')
        .attr('cursor', 'pointer')
        .call(drag(simulation));

    // 标签（默认隐藏，hover 显示）
    const label = g.append('g')
        .selectAll('text')
        .data(data.nodes)
        .join('text')
        .text(d => d.label)
        .attr('font-size', 10)
        .attr('fill', '#aaa')
        .attr('text-anchor', 'middle')
        .attr('dy', d => d.is_category ? -10 : -(d.proficiency || 0) * 5 - 14)
        .style('display', 'none')
        .style('pointer-events', 'none');

    // Tooltip
    const tooltip = d3.select('#graph-tooltip');

    node.on('mouseenter', (event, d) => {
        label.filter(l => l.id === d.id).style('display', 'block');
        tooltip.style('display', 'block')
            .html(`<strong>${d.label}</strong><br>熟练度: ${d.proficiency || '-'}/5<br>分类: ${d.group || '未分类'}`)
            .style('left', (event.pageX + 12) + 'px')
            .style('top', (event.pageY - 12) + 'px');
    });
    node.on('mousemove', (event) => {
        tooltip.style('left', (event.pageX + 12) + 'px')
            .style('top', (event.pageY - 12) + 'px');
    });
    node.on('mouseleave', (event, d) => {
        label.filter(l => l.id === d.id).style('display', 'none');
        tooltip.style('display', 'none');
    });

    // 点击节点: 高亮关联节点
    node.on('click', (event, d) => {
        const connectedIds = new Set();
        connectedIds.add(d.id);
        data.edges.forEach(e => {
            if (e.from === d.id) connectedIds.add(e.to);
            if (e.to === d.id) connectedIds.add(e.from);
        });
        node.attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.15);
        link.attr('opacity', e => (e.from === d.id || e.to === d.id) ? 1 : 0.05);
        label.style('display', n => connectedIds.has(n.id) ? 'block' : 'none');

        // 点击空白处恢复
        svg.on('click', (evt) => {
            if (evt.target === svg.node()) {
                node.attr('opacity', 1);
                link.attr('opacity', 0.5);
                label.style('display', 'none');
                svg.on('click', null);
            }
        });
    });

    // Tick 更新位置
    simulation.on('tick', () => {
        link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
        node
            .attr('cx', d => d.x)
            .attr('cy', d => d.y);
        label
            .attr('x', d => d.x)
            .attr('y', d => d.y);
    });

    // 拖拽函数
    function drag(sim) {
        function dragstarted(event) {
            if (!event.active) sim.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }
        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        function dragended(event) {
            if (!event.active) sim.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }
        return d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended);
    }
}

function renderLegend(groups) {
    const container = $('#graph-legend');
    if (!groups || groups.length === 0) {
        container.innerHTML = '';
        return;
    }
    let html = '';
    groups.forEach(g => {
        const color = graphColor(g);
        html += `<div class="legend-item" data-group="${escapeHtml(g)}" onclick="toggleLegendGroup(this)" title="点击切换显隐">
            <span class="legend-color" style="background:${color}"></span>
            ${escapeHtml(g)}
        </div>`;
    });
    container.innerHTML = html;
}

function toggleLegendGroup(el) {
    el.classList.toggle('hidden');
    const group = el.dataset.group;
    const hidden = el.classList.contains('hidden');
    if (graphSimulation) {
        d3.selectAll('#graph-svg-container circle')
            .filter(d => d.group === group && !d.is_category)
            .attr('opacity', hidden ? 0.15 : 1);
    }
}

function renderGraphList(nodes) {
    const container = $('#graph-list');
    if (nodes.length === 0) {
        container.innerHTML = '';
        return;
    }

    // 按 group 分组
    const groups = {};
    nodes.forEach(node => {
        const g = node.group || '未分类';
        if (!groups[g]) groups[g] = [];
        groups[g].push(node);
    });

    let html = '<h3 style="margin:16px 0 10px;">知识点列表</h3>';
    const sortedGroups = Object.keys(groups).sort();

    sortedGroups.forEach(groupName => {
        const items = groups[groupName];
        html += `<div class="collapse-group">`;
        html += `<div class="collapse-header" onclick="toggleCollapse(this)">
            <span class="arrow">▼</span>
            ${escapeHtml(groupName)}
            <span class="count">${items.length} 项</span>
        </div>`;
        html += `<div class="collapse-body">`;
        items.forEach(node => {
            const levelText = node.proficiency >= 5 ? '掌握' : node.proficiency >= 3 ? '熟练' : '了解';
            const levelClass = node.proficiency >= 5 ? 'high' : node.proficiency >= 3 ? 'mid' : 'low';
            html += `<div class="card">
                <div class="card-header">
                    <span class="card-title">${escapeHtml(node.label)}</span>
                    <span style="font-size:12px;color:#888;">${levelText} (${node.proficiency}/5)</span>
                </div>
                <div class="prog-bar"><div class="prog-fill ${levelClass}" style="width:${node.proficiency * 20}%"></div></div>
            </div>`;
        });
        html += `</div></div>`;
    });

    container.innerHTML = html;
}

function toggleCollapse(header) {
    const group = header.parentElement;
    group.classList.toggle('collapsed');
    const body = group.querySelector('.collapse-body');
    body.classList.toggle('collapsed');
}

        const card = document.createElement('div');

            <div class="card-header">
                <div>
                    <span style="font-size:16px;">&#128736;</span>
                    <span class="card-title">${escapeHtml(item.name)}</span>

                    <div class="card-meta">使用: ${item.usage_count}次 · 成功率: ${(item.success_rate * 100).toFixed(0)}%</div>
                </div>
                <button class="delete-btn" data-action="delete-skill" data-id="${item.id}">&times;</button>
            </div>
            <div class="card-detail"></div>
        `;
        card.addEventListener('click', async (e) => {
            if (e.target.closest('[data-action]')) return;
            const detail = card.querySelector('.card-detail');
            if (card.classList.contains('expanded')) { card.classList.remove('expanded'); return; }
            if (!detail.innerHTML) {
                detail.innerHTML = '<span style="color:#888;">加载中...</span>';
                try {
                    const full = await api('/api/skills/' + item.id);
                    detail.innerHTML = simpleMd(full.file_content || full.behavior_rules || '暂无内容');
                } catch (e) {
                    detail.innerHTML = '<span style="color:#e94560;">加载失败</span>';
                }
            }
            card.classList.add('expanded');
        });
        container.appendChild(card);
    });
}

async function loadActions() {
    try {
        const data = await api('/api/actions');
        if (data && data.actions) {
            renderActionCards(data.actions);
            STATE.actionsLoaded = true;
        }
    } catch (e) {
        // api() 已处理 toast 提示
    }
}

function renderActionCards(actions) {
    const container = $('#action-cards');
    if (!container) return;
    container.innerHTML = '';

    actions.forEach(action => {
        const card = document.createElement('div');
        card.className = 'action-card';
        card.innerHTML = `
            <div class="action-icon">${action.icon}</div>
            <div class="action-name">${escapeHtml(action.name)}</div>
            <div class="action-desc">${escapeHtml(action.description)}</div>
            <button class="action-trigger" data-trigger="${action.trigger}">执行</button>
        `;
        container.appendChild(card);
    });

    container.querySelectorAll('.action-trigger').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            executeAction(btn.dataset.trigger);
        });
    });
}

async function executeAction(trigger) {
    // 禁用全部卡片
    const cards = document.querySelectorAll('.action-card');
    cards.forEach(c => c.classList.add('running'));

    // 显示流式面板
    const streamPanel = $('#action-stream');
    streamPanel.style.display = 'block';
    streamPanel.innerHTML = '';
    const streamCtrl = createStreamingPanel(streamPanel);

    try {
        const resp = await fetch('/api/actions/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ trigger: trigger }),
        });

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || 'HTTP ' + resp.status);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const event = JSON.parse(line.slice(6));
                        handleSSEEvent(event, streamCtrl);
                    } catch (e) {
                        // 忽略 JSON 解析错误
                    }
                }
            }
        }
    } catch (e) {
        streamCtrl.finalize('请求失败: ' + escapeHtml(e.message));
    }

    cards.forEach(c => c.classList.remove('running'));
}
